services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway_service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ORDERS_URL: "http://orders:8001"
      SCENARIO: "${SCENARIO:-normal}"
    depends_on:
      - orders

  orders:
    build:
      context: .
      dockerfile: services/orders_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      INVENTORY_URL: "http://inventory:8002"
      PAYMENTS_URL: "http://payments:8003"
      SCENARIO: "${SCENARIO:-normal}"
    depends_on:
      - inventory
      - payments

  inventory:
    build:
      context: .
      dockerfile: services/inventory_service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      SCENARIO: "${SCENARIO:-normal}"

  payments:
    build:
      context: .
      dockerfile: services/payments_service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      SCENARIO: "${SCENARIO:-normal}"
